{{define "content"}}
<h1>Artifacts</h1>

<form method="get" action="/artifacts" role="group">
  <input type="text" name="kind" placeholder="kind" value="">
  <input type="text" name="scope" placeholder="scope" value="{{.ScopeFilter}}">
  <input type="text" name="status" placeholder="status" value="">
  <button type="submit">Filter</button>
</form>

{{if .Artifacts}}
<table>
  <thead>
    <tr><th>ID</th><th>Kind</th><th>Scope</th><th>Status</th><th>Title</th><th>Tree</th></tr>
  </thead>
  <tbody>
    {{range .Artifacts}}
    <tr>
      <td><a href="/artifacts/{{.ID}}">{{.ID}}</a></td>
      <td>
        <span class="kind-dot" style="background:var(--color-kind-{{labelValue .Labels "kind:"}},#94a3b8)"></span>{{labelValue .Labels "kind:"}}
      </td>
      <td>{{labelValue .Labels "scope:"}}</td>
      <td><span class="badge badge-{{labelValue .Labels "status:"}}">{{labelValue .Labels "status:"}}</span></td>
      <td>{{.Title}}</td>
      <td><a href="/tree/{{.ID}}">tree</a></td>
    </tr>
    {{end}}
  </tbody>
</table>
{{else}}
<p>No artifacts found.</p>
{{end}}
{{end}}
