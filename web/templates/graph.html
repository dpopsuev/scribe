{{define "content"}}
<style>
  body { overflow: hidden; }
  #graph-root { position:fixed; top:0; left:0; right:0; bottom:0; z-index:0; }

  #controls {
    position:fixed; top:1rem; left:1rem; z-index:10;
    background:rgba(5,5,20,0.82); backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.1); border-radius:10px;
    padding:0.8rem 1rem; display:flex; flex-direction:column;
    gap:0.5rem; min-width:210px; font-size:0.82em; color:#e2e8f0;
  }
  #controls strong { font-size:0.95em; color:#f1f5f9; letter-spacing:0.02em; }
  #controls label { display:flex; flex-direction:column; gap:0.15rem; }
  #controls select {
    background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.18);
    color:#e2e8f0; border-radius:5px; padding:0.2rem 0.45rem; font-size:0.88em;
  }
  .rel-toggles { display:flex; flex-wrap:wrap; gap:0.25rem; }
  .rel-toggle {
    cursor:pointer; padding:0.12rem 0.45rem; border-radius:4px;
    border:1px solid rgba(255,255,255,0.25); font-size:0.75em;
    user-select:none; transition:background 0.12s, border-color 0.12s;
  }
  .rel-toggle.active { background:rgba(255,255,255,0.2); border-color:rgba(255,255,255,0.5); }

  #mode-badge {
    font-size:0.72em; padding:0.15rem 0.5rem; border-radius:3px;
    background:rgba(99,102,241,0.3); border:1px solid rgba(99,102,241,0.5);
    color:#c7d2fe; align-self:flex-start;
  }

  #expanded-list { display:flex; flex-wrap:wrap; gap:0.2rem; max-width:200px; }
  .expanded-tag {
    font-size:0.7em; padding:0.1rem 0.4rem; border-radius:3px;
    background:rgba(16,185,129,0.2); border:1px solid rgba(16,185,129,0.4);
    color:#6ee7b7; cursor:pointer; display:flex; align-items:center; gap:0.3rem;
  }
  .expanded-tag:hover { background:rgba(16,185,129,0.35); }

  #stats { opacity:0.5; font-size:0.72em; margin-top:0.1rem; }
  #hint { position:fixed; bottom:1rem; left:50%; transform:translateX(-50%);
    z-index:10; color:rgba(255,255,255,0.3); font-size:0.72em; pointer-events:none; }

  #sidebar {
    position:fixed; top:0; right:0; width:370px; height:100vh;
    background:rgba(5,5,20,0.92); backdrop-filter:blur(14px);
    border-left:1px solid rgba(255,255,255,0.1); z-index:10;
    overflow-y:auto; padding:1.2rem; color:#e2e8f0;
    transform:translateX(100%); transition:transform 0.2s ease;
  }
  #sidebar.open { transform:translateX(0); }
  #sidebar-close { position:absolute; top:0.8rem; right:0.8rem;
    cursor:pointer; font-size:1.1em; opacity:0.5; }
  #sidebar-close:hover { opacity:1; }
  #sidebar h3 { color:#f1f5f9; margin-bottom:0.5rem; }
  #sidebar h4 { color:#cbd5e1; }
  #sidebar a { color:#93c5fd; }
  #sidebar .badge { background:rgba(255,255,255,0.12); color:#e2e8f0; }
  #sidebar .meta-table td { border-color:rgba(255,255,255,0.08); }
  #sidebar .section-block { border-top:1px solid rgba(255,255,255,0.08); padding-top:0.5rem; }
  #sidebar .fragment-meta { display:flex; gap:0.35rem; flex-wrap:wrap; margin-top:0.2rem; }
  .htmx-indicator { opacity:0.45; font-size:0.85em; }

  #ctx-menu {
    position:fixed; z-index:100;
    background:rgba(5,5,20,0.96); border:1px solid rgba(255,255,255,0.15);
    border-radius:7px; padding:0.35rem 0; font-size:0.82em; color:#e2e8f0;
    min-width:170px; box-shadow:0 8px 32px rgba(0,0,0,0.5);
  }
  .ctx-item { padding:0.32rem 0.75rem; cursor:pointer; }
  .ctx-item:hover { background:rgba(255,255,255,0.1); }
  .ctx-sep { border-top:1px solid rgba(255,255,255,0.1); margin:0.2rem 0; }
</style>

<div id="graph-root"></div>

<div id="controls">
  <strong>Scribe Graph</strong>
  <div id="mode-badge">universe · scope view</div>

  <label>
    Status filter
    <select id="status-select">
      <option value="active,draft,current,proposed,in_progress,in_review,fleeting">Active work</option>
      <option value="active,draft,current,proposed,in_progress,in_review,fleeting,complete,archived">All</option>
      <option value="active,current,in_progress">Active only</option>
    </select>
  </label>

  <div>
    <div style="opacity:0.6;margin-bottom:0.25rem">Relations (micro)</div>
    <div class="rel-toggles" id="rel-toggles">
      <span class="rel-toggle active" data-rel="parent_of">parent_of</span>
      <span class="rel-toggle active" data-rel="depends_on">depends_on</span>
      <span class="rel-toggle" data-rel="implements">implements</span>
      <span class="rel-toggle" data-rel="justifies">justifies</span>
      <span class="rel-toggle" data-rel="satisfies">satisfies</span>
    </div>
  </div>

  <div id="expanded-wrap" style="display:none">
    <div style="opacity:0.6;margin-bottom:0.2rem">Expanded scopes</div>
    <div id="expanded-list"></div>
  </div>

  <div id="stats"></div>
</div>

<div id="sidebar">
  <span id="sidebar-close" onclick="closeSidebar()">✕</span>
  <div id="sidebar-content">
    <p class="htmx-indicator">Click a node to view details</p>
  </div>
</div>
<div id="hint">Click scope sphere to expand · Double-click artifact to collapse · Drag to orbit · Scroll to zoom</div>
<div id="ctx-menu" style="display:none"></div>

<script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
<!-- 3d-force-graph bundles Three.js internally but does not expose window.THREE.
     We use three.cjs (CommonJS build, works as UMD in modern browsers) to get
     THREE globally for the scope bubble geometry. If it fails to load, bubbles
     are silently disabled — the graph still runs. -->
<script src="https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1.80.0/dist/3d-force-graph.min.js"></script>
<script type="module">
import { initGraph } from '/static/graph/graph.js?v={{.Version}}';
initGraph({
  ForceGraph3D: window.ForceGraph3D,
  THREE:        window.THREE,
  culori:       window.culori,
  htmx:         window.htmx,
});
</script>
{{end}}
