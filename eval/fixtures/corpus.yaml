  - id: FIX-NOISE-018
    kind: concept
    status: active
    title: "BM25 — Best Match 25 probabilistic text ranking function"
    sections:
      - name: body
        text: |
          BM25 ranks documents by term frequency (TF) normalized by document
          length and inverse document frequency (IDF). Parameters k1 and b tune
          TF saturation and length normalization. SQLite FTS5 uses BM25 via rank.
          Volume bias: high-TF documents score well even when match is incidental.

  - id: FIX-NOISE-019
    kind: note
    status: evergreen
    title: "WAL mode — SQLite Write-Ahead Logging for concurrent reads"
    sections:
      - name: body
        text: |
          SQLite WAL mode allows concurrent readers during a write.
          Enable with: PRAGMA journal_mode=WAL. Readers don't block writers.
          Checkpointing: WAL file merged back to main DB periodically.
          Parchment SQLiteStore uses WAL mode for read/write separation.

