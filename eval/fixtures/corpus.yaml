          Three ways agents deposit memory:
          1. knowledge(action=capture) — deliberate note during work
          2. knowledge(action=ingest_session) — post-session bulk import
          3. task/decision completion → future recall finds completed work
          The vault grows from deliberate capture and from automatic session
          ingestion. Promote elevates fleeting notes to evergreen.

