          Most common ghost fields: description, body, notes, goals, mission,
          success_criteria. All now return errors with attach_section redirect.

  - id: FIX-TSK-001
    kind: task
    status: complete
    title: "SetField unknown field error must redirect to attach_section"
    goal: "Error message must include 'use attach_section' so agents know what to do"
    sections:
      - name: context
        text: |
          After SetField fix: unknown fields return error instead of writing to Extra.
