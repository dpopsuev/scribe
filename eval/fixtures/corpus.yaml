  - id: FIX-NOTE-007
    kind: note
    status: evergreen
    title: "Partial draft: artifact status when template sections missing"
    sections:
      - name: body
        text: |
          When an artifact is created with template-required sections missing,
          it is now accepted in draft status rather than hard-rejected.
          Artifact.Warnings carries the conformance message so the agent sees it.
          Template conformance fires when promoting out of draft (→ active).
          Previously: create → ConformanceError with stash_id.
          Now: create → draft (with warnings) → attach_section → promote.
    # flag: C06 → "draft"

  - id: FIX-NOTE-008
    kind: note
    status: evergreen
    title: "recall() kind weights — ranking formula for memory retrieval"
    sections:
      - name: body
        text: |
          recall() ranks candidates by: BM25_proxy × kind_weight × recency_decay.
          Kind weights by artifact type and status:
            evergreen note:  2.0   (most authoritative, curated)
            concept:         1.4
            decision:        1.3   (accepted rationale is high-value memory)
            bug (fixed):     1.2   (root cause is knowledge)
            source:          1.1
            spec (complete): 1.0
            context:         1.0
            task (complete): 0.9   (execution record, lower signal)
            journal:         0.8
          Recency decay: 0.5 + 0.5×exp(-days/130), half-weight at ~90 days.
    # flag: C07 → "1.3"

  - id: FIX-NOTE-010
    kind: note
    status: evergreen
    title: "recall() unified boundary — IsTerminal replaces kind filter"
    sections:
      - name: body
        text: |
          The recall() retrieval boundary was changed from kind-based to
          status-based. Previously: only knowledge kinds (note/journal/source/
          concept/context) were searched. Now: isRecallable() is used.

          isRecallable(art, schema):
            if knowledgeKinds[art.Kind]: return true   // always memory
            return schema.IsTerminal(art.Status)        // done work is history

          Key function: schema.IsTerminal(art.Status) — replaces the static
          knowledgeKindSet map. Completed tasks, fixed bugs, accepted decisions
          are now searchable as memory alongside knowledge artifacts.
    # flag: C08 → "IsTerminal"

  - id: FIX-CTX-006
    kind: context
    status: active
    title: "System A (FTS5) baseline evaluation results"
    sections:
      - name: body
        text: |
          Retrieval evaluation — System A (SQLite FTS5), 20 queries × 5 results.
          Corpus: 110 context artifacts from 140 session compaction summaries.
          Results:
            Total result slots: 100
            Unique artifacts returned: 34
            Duplicate slots: 66 (same 5 Origami/Tako sessions repeated)
          Root cause: FTS5 is volume-biased. Multi-day Origami mega-sessions
          contain every keyword by sheer volume. BM25 cannot distinguish
          "mentioned in passing" from "primary topic of this session".
          System B (cosine) next — encodes meaning, not volume.
    # flag: C09 → "66"

  - id: FIX-NOTE-012
    kind: note
    status: evergreen
    title: "knowledge(action=ingest_session) — session JSONL import"
    sections:
      - name: body
        text: |
          knowledge(action=ingest_session, path=<file-or-dir>, scope=<scope>)
          Imports Pi v3 and Claude Code JSONL session files into the knowledge vault.
          Detects format: Pi (type=session/compaction/message) or Claude Code
          (type=assistant/user/permission-mode).
          Creates: one source artifact per session with provenance section.
          Extracts: compaction summaries and branch summaries as context artifacts,
          linked via cites edge back to the session source.
          Idempotent: re-ingesting same session skips (checks provenance path).
    # flag: C10 → "ingest_session"

