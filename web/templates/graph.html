<script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
<!-- 3d-force-graph bundles Three.js internally but does not expose window.THREE.
     We use three.cjs (CommonJS build, works as UMD in modern browsers) to get
     THREE globally for the scope bubble geometry. If it fails to load, bubbles
     are silently disabled — the graph still runs. -->
<script>
// Attempt to load THREE from three.cjs and shim it as window.THREE.
// Falls back gracefully: the graph runs without bubbles if THREE is absent.
(function() {
  var s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.cjs';
  s.onload = function() {
    // three.cjs exports via CommonJS; in a browser module context it may not
    // set window.THREE. If THREE is already defined after load, nothing to do.
    // Otherwise, the graph runs without scope bubbles.
  };
  document.head.appendChild(s);
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1.80.0/dist/3d-force-graph.min.js"></script>
<script>
// ─── palette ──────────────────────────────────────────────────────────────
const KIND_COLOR = {
  scope:    '#6366f1',  // indigo  — super-node
  task:     '#3b82f6',  // blue
  spec:     '#8b5cf6',  // purple
  bug:      '#ef4444',  // red
  goal:     '#f59e0b',  // amber
  campaign: '#f97316',  // orange
  note:     '#10b981',  // emerald
  concept:  '#06b6d4',  // cyan
  source:   '#64748b',  // slate
  decision: '#ec4899',  // pink
  need:     '#a78bfa',  // violet
  doc:      '#22d3ee',  // sky
  ref:      '#94a3b8',  // grey
};

const REL_COLOR = {
  parent_of:   'rgba(148,163,184,0.45)',
  depends_on:  'rgba(251,146,60,0.65)',
  implements:  'rgba(52,211,153,0.65)',
  justifies:   'rgba(167,139,250,0.65)',
  satisfies:   'rgba(56,189,248,0.65)',
  'cross-scope': 'rgba(99,102,241,0.35)',
};

const nodeColor = n => KIND_COLOR[n.kind] || '#94a3b8';
const linkColor = l => REL_COLOR[l.relation] || 'rgba(148,163,184,0.25)';

// ─── state ────────────────────────────────────────────────────────────────
// Each level is a Map of key → graphData. The graph is the union of macroData
// plus all expanded entries at each level.
const expandedScopes = new Map();  // scope     → graphData (kind-group nodes)
const expandedKinds  = new Map();  // scope:kind → graphData (artifact nodes)
let macroData = { nodes: [], links: [] };
let scopeBubbles = new Map();      // key → THREE.Mesh (scope and kind bubbles)

// ─── graph ────────────────────────────────────────────────────────────────
// Expose as window._Graph so chromedp tests can call graphData(), renderer() etc.
const Graph = window._Graph = ForceGraph3D({ controlType: 'orbit' })(document.getElementById('graph-root'))
  .backgroundColor('#05050f')
  .nodeColor(nodeColor)
  .nodeVal(n => n.kind === 'scope' ? Math.sqrt(n.val || 1) * 4 : Math.sqrt(n.val || 1) * 1.5)
  .nodeOpacity(n => n.kind === 'scope' ? 0.85 : 0.88)
  .nodeLabel(n => {
    const title = n.kind === 'scope'
      ? `<strong>${n.name}</strong><br><span style="opacity:0.7">${n.val} artifacts — click to expand</span>`
      : `<strong>${n.id}</strong><br>${n.name}`;
    return `<div style="background:rgba(0,0,0,0.85);color:#e2e8f0;padding:5px 9px;border-radius:5px;font-size:12px;pointer-events:none;max-width:260px">${title}</div>`;
  })
  .nodeResolution(n => n.kind === 'scope' ? 24 : 8)
  .linkColor(linkColor)
  .linkOpacity(0.55)
  .linkWidth(l => l.relation === 'cross-scope' ? 0.8 : l.relation === 'parent_of' ? 0.4 : 1)
  .linkDirectionalParticles(l => l.relation === 'depends_on' ? 2 : 0)
  .linkDirectionalParticleSpeed(0.004)
  .linkDirectionalParticleWidth(1.5)
  .linkCurvature(l => l.relation === 'depends_on' ? 0.15 : 0)
  .d3AlphaDecay(0.004)      // very slow decay — long float time
  .d3VelocityDecay(0.25)    // low friction — floaty
  .warmupTicks(0)            // no pre-bake; positions come from fibonacci
  .cooldownTime(Infinity)
  .onNodeClick(onNodeClickWithDbl)
  .onNodeRightClick(onNodeRightClick)
  .onBackgroundClick(closeSidebar)
  .onEngineTick(updateBubbles);

// ─── data management ──────────────────────────────────────────────────────
function mergedGraphData() {
  const nodes = [...macroData.nodes];
  const links = [...macroData.links];
  for (const [, d] of expandedScopes) {
    nodes.push(...d.nodes);
    links.push(...d.links);
  }
  for (const [, d] of expandedKinds) {
    nodes.push(...d.nodes);
    links.push(...d.links);
  }
  return { nodes, links };
}

function applyGraphData() {
  Graph.graphData(mergedGraphData());
  updateStats();
  updateExpandedTags();
}

// ─── sphere math (from hegemony/client/src/globe) ─────────────────────────

// Fibonacci sphere: evenly distributes N points on a unit sphere.
// Points [0..N-1] spiral from top to bottom — sort order maps to latitude.
// Golden angle = 2π(1 - 1/φ) ≈ 2.399 rad avoids clustering.
function fibonacciSphere(n, radius) {
  const pts = [];
  const goldenAngle = Math.PI * (3 - Math.sqrt(5)); // ≈ 2.399 rad
  for (let i = 0; i < n; i++) {
    const y = 1 - (i / Math.max(n - 1, 1)) * 2; // y ∈ [1, -1] top → bottom
    const r = Math.sqrt(Math.max(0, 1 - y * y));  // radius of horizontal circle
    const theta = goldenAngle * i;
    pts.push({
      x: Math.cos(theta) * r * radius,
      y: y * radius,
      z: Math.sin(theta) * r * radius,
    });
  }
  return pts;
}

// Custom d3 force: gently attract nodes back toward the sphere surface.
// Replaces 'center' force — nodes float but stay roughly on the sphere.
function forceRadialSphere(targetRadius, strength = 0.08) {
  let nodes;
  function force(alpha) {
    for (const n of nodes) {
      const d = Math.sqrt((n.x||0)**2 + (n.y||0)**2 + (n.z||0)**2) || 1;
      const scale = (targetRadius - d) / d * alpha * strength;
      n.vx = (n.vx || 0) + (n.x || 0) * scale;
      n.vy = (n.vy || 0) + (n.y || 0) * scale;
      n.vz = (n.vz || 0) + (n.z || 0) * scale;
    }
  }
  force.initialize = ns => { nodes = ns; };
  return force;
}

// Store sphere position per scope node id for micro-sphere anchoring.
const scopeSpherePos = new Map(); // scopeName → {x,y,z}

// ─── macro load ───────────────────────────────────────────────────────────
async function loadMacro() {
  document.getElementById('stats').textContent = 'Loading universe…';
  document.getElementById('mode-badge').textContent = 'universe · scope view';

  const res = await fetch('/api/graph/scopes');
  const data = await res.json();

  // Sort scopes by degree (cross-scope link count) — high degree → equator.
  // Build degree map from links.
  const deg = {};
  for (const l of data.links) {
    const s = l.source?.replace ? l.source : l.source;
    const t = l.target?.replace ? l.target : l.target;
    deg[s] = (deg[s] || 0) + 1;
    deg[t] = (deg[t] || 0) + 1;
  }
  // Sort: highest degree first → maps to equator (middle of fibonacci range).
  // Remap: put highest-degree near middle indices (equator), lowest at poles.
  const sorted = [...data.nodes].sort((a, b) => (deg[b.id] || 0) - (deg[a.id] || 0));

  // Equator-priority mapping: interleave from center outward.
  // Index 0 (top degree) → middle; then alternate above/below.
  const n = sorted.length;
  const order = new Array(n);
  let lo = Math.floor(n / 2), hi = lo + 1;
  for (let i = 0; i < n; i++) {
    if (i % 2 === 0) {
      order[i] = lo--;
    } else {
      order[i] = hi++;
    }
  }

  // Assign fibonacci sphere positions.
  const UNIVERSE_RADIUS = 600;
  const positions = fibonacciSphere(n, UNIVERSE_RADIUS);
  for (let i = 0; i < n; i++) {
    const node = sorted[i];
    const pos = positions[order[i]];
    node.x = pos.x; node.y = pos.y; node.z = pos.z;
    // Pin initial position (fx/fy/fz) so warmup doesn't scatter them;
    // release after first tick by clearing in onEngineTick.
    node._sphere = { ...pos }; // remember sphere home
    scopeSpherePos.set(node.scope || node.name, pos);
  }

  // Install radial force, remove center force.
  Graph.d3Force('center', null);
  Graph.d3Force('radial', forceRadialSphere(UNIVERSE_RADIUS, 0.06));
  // Reduce charge repulsion so nodes don't escape the sphere.
  Graph.d3Force('charge')?.strength?.(-120);

  macroData = { nodes: sorted, links: data.links };
  expandedScopes.clear();
  clearBubbles();
  applyGraphData();
  updateModeBadge();
  aimAtCenterOfMass(1200);
}

// ─── N-depth helpers ──────────────────────────────────────────────────────

// Place nodes in a fibonacci mini-sphere around anchor, sorted by degree.
function placeInMiniSphere(nodes, links, anchor, radius) {
  const deg = {};
  for (const l of links) {
    deg[l.source] = (deg[l.source] || 0) + 1;
    deg[l.target] = (deg[l.target] || 0) + 1;
  }
  const sorted = [...nodes].sort((a, b) => (deg[b.id] || 0) - (deg[a.id] || 0));
  const pts = fibonacciSphere(sorted.length, radius);
  sorted.forEach((n, i) => {
    n.x = anchor.x + pts[i].x;
    n.y = anchor.y + pts[i].y;
    n.z = anchor.z + pts[i].z;
  });
  return sorted;
}

// Remove a node id from macroData + clear its links. Used when drilling in.
function removeMacroNode(nodeId) {
  macroData.nodes = macroData.nodes.filter(n => n.id !== nodeId);
  macroData.links = macroData.links.filter(
    l => l.source !== nodeId && l.target !== nodeId &&
         l.source?.id !== nodeId && l.target?.id !== nodeId
  );
}

function updateModeBadge() {
  const depth = expandedKinds.size > 0 ? 'artifact' :
                expandedScopes.size > 0 ? 'kind' : 'scope';
  const labels = { scope: 'universe · scope view', kind: 'depth 1 · kind view', artifact: 'depth 2 · artifact view' };
  document.getElementById('mode-badge').textContent = labels[depth];
}

// ─── depth 0 → 1: scope → kind-groups ────────────────────────────────────
async function expandScope(scopeName) {
  if (expandedScopes.has(scopeName)) return;

  const status = document.getElementById('status-select').value;
  const activeRels = [...document.querySelectorAll('.rel-toggle.active')].map(el => el.dataset.rel);
  const params = new URLSearchParams({ scope: scopeName, status });
  if (activeRels.length) params.set('relations', activeRels.join(','));

  document.getElementById('stats').textContent = `Loading ${scopeName} kinds…`;

  const res = await fetch('/api/graph/kinds?' + params);
  const kindData = await res.json();

  removeMacroNode('scope:' + scopeName);

  const anchor = scopeSpherePos.get(scopeName) || { x: 0, y: 0, z: 0 };
  kindData.nodes = placeInMiniSphere(kindData.nodes, kindData.links, anchor, 90);
  // Store kind sphere positions for depth-2 expansion.
  for (const n of kindData.nodes) {
    scopeSpherePos.set('kind:' + scopeName + ':' + n.group, { x: n.x, y: n.y, z: n.z });
  }

  expandedScopes.set(scopeName, kindData);
  createBubble(scopeName, 100);
  applyGraphData();
  updateModeBadge();
  aimAtCenterOfMass(1200);
}

// ─── depth 1 → 2: kind-group → artifacts ─────────────────────────────────
async function expandKind(scopeName, kindName) {
  const key = scopeName + ':' + kindName;
  if (expandedKinds.has(key)) return;

  const status = document.getElementById('status-select').value;
  const activeRels = [...document.querySelectorAll('.rel-toggle.active')].map(el => el.dataset.rel);
  const params = new URLSearchParams({ scope: scopeName, status });
  if (activeRels.length) params.set('relations', activeRels.join(','));

  document.getElementById('stats').textContent = `Loading ${scopeName}/${kindName}…`;

  // Fetch all artifacts in scope, then filter to this kind client-side.
  const res = await fetch('/api/graph?' + params);
  const artData = await res.json();
  artData.nodes = artData.nodes.filter(n => n.kind === kindName);
  const nodeIds = new Set(artData.nodes.map(n => n.id));
  artData.links = artData.links.filter(l => nodeIds.has(l.source) && nodeIds.has(l.target));

  // Remove the kind-group node from expanded scope.
  const kindNodeId = 'kind:' + key;
  if (expandedScopes.has(scopeName)) {
    const sd = expandedScopes.get(scopeName);
    sd.nodes = sd.nodes.filter(n => n.id !== kindNodeId);
    sd.links = sd.links.filter(l =>
      l.source !== kindNodeId && l.target !== kindNodeId &&
      l.source?.id !== kindNodeId && l.target?.id !== kindNodeId
    );
  }

  const anchor = scopeSpherePos.get(kindNodeId) || scopeSpherePos.get(scopeName) || { x: 0, y: 0, z: 0 };
  artData.nodes = placeInMiniSphere(artData.nodes, artData.links, anchor, 45);

  expandedKinds.set(key, artData);
  createBubble(kindNodeId, 55);
  applyGraphData();
  updateModeBadge();
  aimAtCenterOfMass(1200);
}

// ─── collapse scope → macro ───────────────────────────────────────────────
async function collapseScope(scopeName) {
  if (!expandedScopes.has(scopeName)) return;

  // Also collapse any kind expansions for this scope.
  for (const key of [...expandedKinds.keys()]) {
    if (key.startsWith(scopeName + ':')) {
      expandedKinds.delete(key);
      removeBubble('kind:' + key);
    }
  }
  expandedScopes.delete(scopeName);
  removeBubble(scopeName);

  const res = await fetch('/api/graph/scopes');
  const fresh = await res.json();
  const stillExpanded = new Set(expandedScopes.keys());
  macroData.nodes = fresh.nodes.filter(n => !stillExpanded.has(n.scope));
  macroData.links = fresh.links.filter(l => {
    const fs = (l.source?.id || l.source)?.replace('scope:', '');
    const ts = (l.target?.id || l.target)?.replace('scope:', '');
    return !stillExpanded.has(fs) && !stillExpanded.has(ts);
  });

  applyGraphData();
  updateModeBadge();
}

// ─── click handlers ───────────────────────────────────────────────────────
// Detect double-click via timestamp delta — onNodeDblClick not in 3d-force-graph 1.80.
let _lastClickNode = null, _lastClickTime = 0;
function onNodeClickWithDbl(node) {
  const now = Date.now();
  if (_lastClickNode === node && now - _lastClickTime < 300) {
    _lastClickNode = null;
    onNodeDblClick(node);
    return;
  }
  _lastClickNode = node;
  _lastClickTime = now;
  onNodeClick(node);
}

function onNodeClick(node) {
  if (node.kind === 'scope') {
    expandScope(node.scope || node.name);
    return;
  }
  if (node.kind === 'kind-group') {
    expandKind(node.scope, node.group);
    return;
  }
  openSidebar(node.id);
  // Fly toward the clicked node, keeping it as the new orbit target.
  const APPROACH = 120;
  const center = centerOfMass();
  const dx = (node.x || 0) - center.x;
  const dy = (node.y || 0) - center.y;
  const dz = (node.z || 0) - center.z;
  const dist = Math.hypot(dx, dy, dz) || 1;
  const scale = (dist + APPROACH) / dist;
  Graph.cameraPosition(
    { x: center.x + dx * scale, y: center.y + dy * scale, z: center.z + dz * scale },
    node, 700
  );
  // Pivot orbit around the clicked node, not the world origin.
  const controls = Graph.controls();
  if (controls?.target) {
    controls.target.set(node.x || 0, node.y || 0, node.z || 0);
    controls.update();
  }
}

function onNodeDblClick(node) {
  if (node.kind !== 'scope' && node.scope) {
    collapseScope(node.scope);
  }
}

function onNodeRightClick(node, event) {
  event.preventDefault();
  let items;
  if (node.kind === 'scope') {
    items = [
      { label: '🔭 Expand (kinds)', action: () => expandScope(node.scope || node.name) },
    ];
  } else if (node.kind === 'kind-group') {
    items = [
      { label: '🔬 Expand (artifacts)', action: () => expandKind(node.scope, node.group) },
      { label: '📦 Collapse scope',     action: () => collapseScope(node.scope) },
    ];
  } else {
    items = [
      { label: '🔗 Open detail',    action: () => window.open(`/artifacts/${node.id}`, '_blank') },
      { label: '🌳 Open tree',      action: () => window.open(`/tree/${node.id}`, '_blank') },
      { label: '📦 Collapse scope', action: () => collapseScope(node.scope) },
      { sep: true },
      { label: '⬆ Set active',     action: () => patchField(node.id, 'status', 'active') },
      { label: '✓ Set complete',    action: () => patchField(node.id, 'status', 'complete') },
    ];
  }
  showCtxMenu(event.clientX, event.clientY, items);
}

// ─── Three.js scope bubbles ───────────────────────────────────────────────
// createBubble adds a translucent sphere to the Three.js scene.
// Silently no-ops if THREE is not available (e.g. CDN load failed).
// initialRadius is a hint for the initial scale; updateBubbles adjusts it
// every 6 ticks based on actual node positions.
function createBubble(key, initialRadius = 100) {
  if (typeof THREE === 'undefined') return; // THREE optional — graph works without bubbles
  const scene = Graph.scene();
  const color = new THREE.Color(KIND_COLOR.scope);

  const geo = new THREE.SphereGeometry(1, 32, 32);
  const mat = new THREE.MeshBasicMaterial({
    color, transparent: true, opacity: 0.04,
    side: THREE.BackSide, depthWrite: false,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.scale.setScalar(initialRadius);
  scene.add(mesh);
  scopeBubbles.set(key, mesh);

  const wGeo = new THREE.SphereGeometry(1, 12, 8);
  const wMat = new THREE.MeshBasicMaterial({
    color, transparent: true, opacity: 0.1, wireframe: true,
  });
  const wMesh = new THREE.Mesh(wGeo, wMat);
  wMesh.scale.setScalar(initialRadius);
  scene.add(wMesh);
  scopeBubbles.set(key + '_wire', wMesh);
}

function removeBubble(scopeName) {
  const scene = Graph.scene();
  for (const key of [scopeName, scopeName + '_wire']) {
    const mesh = scopeBubbles.get(key);
    if (mesh) { scene.remove(mesh); scopeBubbles.delete(key); }
  }
}

function clearBubbles() {
  const scene = Graph.scene();
  for (const [, mesh] of scopeBubbles) scene.remove(mesh);
  scopeBubbles.clear();
}

let tickCount = 0;
function updateBubbles() {
  if (++tickCount % 6 !== 0) return;
  // Every ~300 ticks, softly re-aim at center of mass so the camera tracks
  // as nodes drift under physics. 2s animation keeps it gentle.
  if (tickCount % 300 === 0) aimAtCenterOfMass(2000);
  const { nodes } = Graph.graphData();

  // Scope bubbles: encompass all kind-group nodes in scope.
  for (const [scopeName] of expandedScopes) {
    const members = nodes.filter(n => n.scope === scopeName && n.kind === 'kind-group');
    fitBubble(scopeName, members, 50);
  }

  // Kind bubbles: encompass all artifact nodes for that kind in scope.
  for (const [key] of expandedKinds) {
    const [scopeName, kindName] = key.split(':');
    const members = nodes.filter(n => n.scope === scopeName && n.kind === kindName);
    fitBubble('kind:' + key, members, 25);
  }
}

// ─── sidebar ──────────────────────────────────────────────────────────────
function openSidebar(id) {
  const sidebar = document.getElementById('sidebar');
  const content = document.getElementById('sidebar-content');
  content.innerHTML = '<p class="htmx-indicator">Loading…</p>';
  sidebar.classList.add('open');
  fetch(`/fragments/artifacts/${encodeURIComponent(id)}`)
    .then(r => r.text())
    .then(html => { content.innerHTML = html; htmx.process(content); })
    .catch(() => { content.innerHTML = `<p>Could not load ${id}</p>`; });
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
}

// ─── context menu ─────────────────────────────────────────────────────────
function showCtxMenu(x, y, items) {
  const menu = document.getElementById('ctx-menu');
  menu.innerHTML = '';
  items.forEach(item => {
    if (item.sep) {
      const sep = document.createElement('div');
      sep.className = 'ctx-sep';
      menu.appendChild(sep);
    } else {
      const el = document.createElement('div');
      el.className = 'ctx-item';
      el.textContent = item.label;
      el.onclick = () => { item.action(); menu.style.display = 'none'; };
      menu.appendChild(el);
    }
  });
  menu.style.display = 'block';
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
  setTimeout(() => document.addEventListener('click', () => { menu.style.display = 'none'; }, { once: true }), 10);
}

// ─── expanded tags ────────────────────────────────────────────────────────
function updateExpandedTags() {
  const wrap = document.getElementById('expanded-wrap');
  const list = document.getElementById('expanded-list');
  list.innerHTML = '';
  const total = expandedScopes.size + expandedKinds.size;
  if (total === 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  for (const [sc] of expandedScopes) {
    const tag = document.createElement('span');
    tag.className = 'expanded-tag';
    tag.innerHTML = `${sc} <span style="opacity:0.6">✕</span>`;
    tag.onclick = () => collapseScope(sc);
    list.appendChild(tag);
  }
  for (const [key] of expandedKinds) {
    const [sc, kind] = key.split(':');
    const tag = document.createElement('span');
    tag.className = 'expanded-tag';
    tag.style.background = 'rgba(99,102,241,0.2)';
    tag.style.borderColor = 'rgba(99,102,241,0.4)';
    tag.style.color = '#c7d2fe';
    tag.innerHTML = `${sc}/${kind} <span style="opacity:0.6">✕</span>`;
    tag.onclick = () => {
      expandedKinds.delete(key);
      removeBubble('kind:' + key);
      applyGraphData();
      updateModeBadge();
    };
    list.appendChild(tag);
  }
}

function updateStats() {
  const { nodes, links } = Graph.graphData();
  document.getElementById('stats').textContent = `${nodes.length} nodes · ${links.length} links`;
}

// ─── write ────────────────────────────────────────────────────────────────
async function patchField(id, field, value) {
  const res = await fetch(`/api/artifacts/${encodeURIComponent(id)}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ field, value }),
  });
  if (!res.ok) { const t = await res.text(); alert(`Error: ${t}`); }
}

// ─── controls ─────────────────────────────────────────────────────────────
document.querySelectorAll('.rel-toggle').forEach(el =>
  el.addEventListener('click', () => el.classList.toggle('active')));

// ─── camera ───────────────────────────────────────────────────────────────

// Compute the weighted centroid of the outermost visible nodes only.
// Expanded leaf nodes (artifacts, kind-groups when inside a scope drill)
// are excluded — the center tracks the largest parent spheres regardless
// of drill depth. Falls back to all nodes only when no parents remain.
function centerOfMass() {
  const { nodes } = Graph.graphData();
  if (!nodes.length) return { x: 0, y: 0, z: 0 };

  // Parent nodes are scopes and kind-groups — the structural super-nodes.
  // Individual artifact nodes are always leaves and must not pull the center.
  const parents = nodes.filter(n => n.kind === 'scope' || n.kind === 'kind-group');
  const pool = parents.length ? parents : nodes;

  let cx = 0, cy = 0, cz = 0, totalW = 0;
  for (const n of pool) {
    const w = n.val || 1;
    cx += (n.x || 0) * w;
    cy += (n.y || 0) * w;
    cz += (n.z || 0) * w;
    totalW += w;
  }
  return { x: cx / totalW, y: cy / totalW, z: cz / totalW };
}

// Point camera at center of mass and set orbit target so the camera
// rotates around the actual data cloud, not the world origin.
// animMs=0 for instant snap, >0 for smooth transition.
function aimAtCenterOfMass(animMs = 0) {
  const center = centerOfMass();

  // Compute a sensible camera distance: bounding radius of the node cloud.
  const { nodes } = Graph.graphData();
  let radius = 200;
  for (const n of nodes) {
    const d = Math.hypot((n.x||0) - center.x, (n.y||0) - center.y, (n.z||0) - center.z);
    if (d > radius) radius = d;
  }
  const camDist = radius * 2.2; // stand back far enough to see everything

  // Keep current camera direction; just rescale distance from the new center.
  const pos = Graph.camera().position;
  const dir = { x: pos.x - center.x, y: pos.y - center.y, z: pos.z - center.z };
  const len = Math.hypot(dir.x, dir.y, dir.z) || 1;
  const scale = camDist / len;

  Graph.cameraPosition(
    { x: center.x + dir.x * scale, y: center.y + dir.y * scale, z: center.z + dir.z * scale },
    center,
    animMs
  );

  // Set OrbitControls target so rotation pivots around center of mass.
  const controls = Graph.controls();
  if (controls?.target) {
    controls.target.set(center.x, center.y, center.z);
    controls.update();
  }
}

window.addEventListener('resize', () =>
  Graph.width(window.innerWidth).height(window.innerHeight));
