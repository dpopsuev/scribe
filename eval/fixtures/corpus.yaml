  # C07 red herrings (about recall, not the weight value)
  - id: FIX-CON-003
    kind: concept
    status: active
    title: "recall() — unified memory retrieval across work and knowledge"
    sections:
      - name: body
        text: |
          recall() searches knowledge artifacts AND completed work artifacts.
          The boundary is status (IsTerminal), not kind (family).
          Completed tasks, fixed bugs, accepted decisions are memory.
          Active work (draft, active, open) is excluded — that is the tracker.
          This removes the artificial separation between work tracking and
          knowledge management for agents using a single store.

  - id: FIX-TSK-005
    kind: task
    status: complete
    title: "Implement recall() with multi-pass FTS and recency decay"
    goal: "knowledge(action=recall, query=<text>) finds relevant memory artifacts"

  - id: FIX-NOTE-009
    kind: note
    status: evergreen
    title: "recall() multi-pass FTS query strategy"
    sections:
      - name: body
        text: |
          recall() builds three FTS passes from most to least strict:
          Pass 1: exact phrase — "template conformance on promote"
          Pass 2: all terms (AND) — template conformance promote
          Pass 3: individual terms ≥4 chars — template, conformance, promote
          Results deduplicated and ranked. Top-5 returned with excerpts.

  # C08 red herrings (about the boundary concept, not the function name)
  - id: FIX-DEC-003
    kind: decision
    status: accepted
    title: "Work and knowledge are two sides of the same coin"
    goal: |
      Completed work IS memory. The kind boundary in recall() is artificial
      for agents using a single store. Replace with status boundary.

  # C09 red herrings (about FTS5 analysis, not the 66 number)
  - id: FIX-NOTE-011
    kind: note
    status: evergreen
    title: "FTS5 volume bias — why large documents dominate retrieval"
    sections:
      - name: body
        text: |
          FTS5 BM25 normalizes for document length but cannot distinguish
          "mentions this topic in passing" from "this is the primary topic".
          Origami/Tako mega-sessions (multi-day, 3000+ words) mention Scribe,
          template, SetField etc. because they use Scribe to track their work.
          These sessions dominate FTS5 results for any Scribe-related query.
          Cosine similarity encodes meaning — not vulnerable to volume bias.

  - id: FIX-SRC-002
    kind: source
    status: active
    title: "Retrieval evaluation harness design"
    sections:
      - name: provenance
        text: "scribe/eval/ — cmd/eval/main.go, queries.yaml, fixtures/"
      - name: summary
        text: |
          A/B test framework: System A (FTS5) vs System B (cosine).
          Metric: precision@5 and turns-to-flag (CTF scenario).
          Corpus: fixture artifacts with known ground truth (qrels).
          20 evaluation queries across 4 bands: easy/medium/hard/cross.

  - id: FIX-CON-004
    kind: concept
    status: active
    title: "CTF evaluation — turns to flag as agent memory metric"
    sections:
      - name: body
        text: |
          Turns to flag (TTF): how many recall() calls before an agent finds
          a specific fact buried in the knowledge vault.
          Better than precision@5 because it measures task completion not
          retrieval quality — fewer turns = cheaper agents in production.
          TTF=1: perfect recall, TTF=2-3: good, TTF=4-5: poor, DNF: broken.

