# CTF Challenges — Capture The Flag evaluation for agent memory retrieval.
#
# Each challenge presents the agent with a question requiring a specific fact
# buried in the knowledge vault. The agent uses recall() and artifact(get)
# to find the answer. Metric: turns to flag (TTF), max 5 turns.
#
# A "turn" = one recall() call. artifact(get) reads are free.
# Score: TTF=1 (perfect), TTF=2-3 (good), TTF=4-5 (poor), DNF (broken).

challenges:
  - id: C01
    prompt: |
      How many ghost field set calls were silently writing data to Artifact.Extra
      before the SetField fix was implemented? Give the exact number.
    flag: "571"
    flag_pattern: "^571$"
    hint: "Look in production data analysis — agent behavior observed across sessions"
    golden: FIX-CTX-001
    red_herrings: [FIX-NOTE-001, FIX-NOTE-002, FIX-TSK-001]

  - id: C02
    prompt: |
      How many template conformance errors occurred at artifact create time before
      the fix that moved validation to promote? Give the exact number.
    flag: "597"
    flag_pattern: "^597$"
    hint: "Look in error analysis and production observations"
    golden: FIX-CTX-002
    red_herrings: [FIX-NOTE-003, FIX-DEC-001, FIX-TSK-002]

  - id: C03
    prompt: |
      How many errors were caused by agents calling artifact(action=move) when
      the correct action was on the graph tool? Exact number.
    flag: "63"
    flag_pattern: "^63$"
    hint: "Look in agent friction analysis — MCP tool usage errors"
    golden: FIX-CTX-003
    red_herrings: [FIX-NOTE-004, FIX-TSK-003, FIX-CON-001]

  - id: C04
    prompt: |
      How many methods did AdminManager have before the ISP cleanup that moved
      Scribe-specific operations out of Parchment? Exact number.
    flag: "17"
    flag_pattern: "^17$"
    hint: "Look in architecture analysis — Locus scan results"
    golden: FIX-CTX-004
    red_herrings: [FIX-NOTE-005, FIX-DEC-002, FIX-TSK-004]

  - id: C05
    prompt: |
      How many total Scribe MCP tool calls were analyzed in the production
      session data? Exact number.
    flag: "29,097"
    flag_pattern: "29.?097"
    hint: "Look in production data analysis — Claude Code sessions"
    golden: FIX-SRC-001
    red_herrings: [FIX-CTX-005, FIX-NOTE-006, FIX-CON-002]

  - id: C06
    prompt: |
      What status does an artifact receive when it is created with template-required
      sections missing? One word.
    flag: "draft"
    flag_pattern: "^draft$"
    hint: "Look in notes about template conformance behavior changes"
    golden: FIX-NOTE-007
    red_herrings: [FIX-DEC-001, FIX-NOTE-003, FIX-TSK-002]

  - id: C07
    prompt: |
      In the recall() ranking function, what kind weight is assigned to accepted
      decisions? Give the exact decimal number.
    flag: "1.3"
    flag_pattern: "^1\\.3$"
    hint: "Look in notes about the recall implementation and kind weights"
    golden: FIX-NOTE-008
    red_herrings: [FIX-CON-003, FIX-TSK-005, FIX-NOTE-009]

  - id: C08
    prompt: |
      What is the name of the Schema method that replaced the knowledgeKindSet
      map as the boundary condition in recall()? Exact function name.
    flag: "IsTerminal"
    flag_pattern: "IsTerminal"
    hint: "Look in notes about unified memory boundary and recall implementation"
    golden: FIX-NOTE-010
    red_herrings: [FIX-CON-003, FIX-DEC-003, FIX-TSK-005]

  - id: C09
    prompt: |
      In System A (FTS5) baseline evaluation, how many of the 100 result slots
      were filled by duplicate artifacts? Exact number.
    flag: "66"
    flag_pattern: "^66$"
    hint: "Look in evaluation results and FTS5 analysis notes"
    golden: FIX-CTX-006
    red_herrings: [FIX-NOTE-011, FIX-SRC-002, FIX-CON-004]

  - id: C10
    prompt: |
      What is the exact knowledge tool action name used to import Pi and Claude
      Code JSONL session files into the knowledge vault?
    flag: "ingest_session"
    flag_pattern: "ingest_session"
    hint: "Look in notes about agent memory write path and session ingestion"
    golden: FIX-NOTE-012
    red_herrings: [FIX-NOTE-013, FIX-TSK-006, FIX-SRC-003]
