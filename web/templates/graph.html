{{define "content"}}
<style>
  #graph-root {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 0;
  }
  #controls {
    position: fixed;
    top: 1rem; left: 1rem;
    z-index: 10;
    background: rgba(0,0,0,0.75);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    min-width: 220px;
    font-size: 0.85em;
    color: #e2e8f0;
    backdrop-filter: blur(8px);
  }
  #controls label { display: flex; flex-direction: column; gap: 0.2rem; }
  #controls select, #controls input {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #e2e8f0;
    border-radius: 4px;
    padding: 0.25rem 0.5rem;
    font-size: 0.9em;
  }
  #controls .rel-toggles { display: flex; flex-wrap: wrap; gap: 0.3rem; }
  #controls .rel-toggle {
    cursor: pointer;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.3);
    font-size: 0.8em;
    user-select: none;
    transition: background 0.15s;
  }
  #controls .rel-toggle.active { background: rgba(255,255,255,0.25); }
  #sidebar {
    position: fixed;
    top: 0; right: 0;
    width: 380px;
    height: 100vh;
    background: rgba(10,10,20,0.9);
    backdrop-filter: blur(12px);
    z-index: 10;
    overflow-y: auto;
    padding: 1.25rem;
    color: #e2e8f0;
    transform: translateX(100%);
    transition: transform 0.2s ease;
    border-left: 1px solid rgba(255,255,255,0.1);
  }
  #sidebar.open { transform: translateX(0); }
  #sidebar-close {
    position: absolute; top: 0.75rem; right: 0.75rem;
    cursor: pointer; font-size: 1.2em; opacity: 0.6;
  }
  #sidebar-close:hover { opacity: 1; }
  #sidebar .meta-table { color: #e2e8f0; }
  #sidebar .meta-table td { border-color: rgba(255,255,255,0.1); }
  #sidebar .badge { background: rgba(255,255,255,0.15); color: #e2e8f0; }
  #sidebar a { color: #93c5fd; }
  #sidebar h3 { color: #f1f5f9; margin-bottom: 0.5rem; }
  #sidebar h4 { color: #cbd5e1; }
  #sidebar .section-block { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 0.5rem; }
  #sidebar .fragment-header { margin-bottom: 0.75rem; }
  #sidebar .fragment-meta { margin-top: 0.25rem; display: flex; gap: 0.4rem; flex-wrap: wrap; }
  #sidebar .badge-scope { font-size:0.75em; opacity: 0.7; }
  .htmx-indicator { opacity: 0.5; font-size: 0.85em; padding: 0.5rem; }
  #hint {
    position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
    z-index: 10; color: rgba(255,255,255,0.35); font-size: 0.75em; pointer-events: none;
  }
</style>

<div id="graph-root"></div>

<div id="controls">
  <strong style="font-size:1em;color:#f1f5f9">Scribe Graph</strong>

  <label>
    Scope
    <select id="scope-select">
      <option value="">All (multi-layer 3D)</option>
    </select>
  </label>

  <label>
    Status
    <select id="status-select">
      <option value="active,draft,current,proposed,in_progress,in_review,fleeting">Active work</option>
      <option value="active,draft,current,proposed,in_progress,in_review,fleeting,complete,archived">All</option>
      <option value="active,current,in_progress">Active only</option>
    </select>
  </label>

  <div>
    <div style="margin-bottom:0.3rem;opacity:0.7">Relations</div>
    <div class="rel-toggles" id="rel-toggles">
      <span class="rel-toggle active" data-rel="parent_of">parent_of</span>
      <span class="rel-toggle active" data-rel="depends_on">depends_on</span>
      <span class="rel-toggle" data-rel="implements">implements</span>
      <span class="rel-toggle" data-rel="justifies">justifies</span>
      <span class="rel-toggle" data-rel="satisfies">satisfies</span>
      <span class="rel-toggle" data-rel="documents">documents</span>
    </div>
  </div>

  <button id="reload-btn" style="font-size:0.8em;padding:0.3rem 0.6rem;margin-top:0.25rem">Reload graph</button>
  <div id="stats" style="opacity:0.5;font-size:0.75em"></div>
</div>

<div id="sidebar">
  <span id="sidebar-close" onclick="closeSidebar()">✕</span>
  <div id="sidebar-content">
    <p class="htmx-indicator">Select a node to view details</p>
  </div>
</div>

<div id="hint">Click node · Drag to rotate · Scroll to zoom</div>

<script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1.80.0/dist/3d-force-graph.min.js"></script>
<script>
// ─── colour palette ───────────────────────────────────────────────────────
const KIND_COLORS = {
  task:     '#3b82f6',  // blue
  spec:     '#8b5cf6',  // purple
  bug:      '#ef4444',  // red
  goal:     '#f59e0b',  // amber
  campaign: '#f97316',  // orange
  note:     '#10b981',  // emerald
  concept:  '#06b6d4',  // cyan
  source:   '#64748b',  // slate
  decision: '#ec4899',  // pink
  need:     '#a78bfa',  // violet
  doc:      '#22d3ee',  // sky
  ref:      '#94a3b8',  // grey
};

const REL_COLORS = {
  parent_of:  'rgba(148,163,184,0.6)',
  depends_on: 'rgba(251,146,60,0.7)',
  implements: 'rgba(52,211,153,0.7)',
  justifies:  'rgba(167,139,250,0.7)',
  satisfies:  'rgba(56,189,248,0.7)',
  documents:  'rgba(148,163,184,0.4)',
};

const nodeColor = n => KIND_COLORS[n.kind] || '#94a3b8';
const linkColor = l => REL_COLORS[l.relation] || 'rgba(148,163,184,0.3)';

// ─── scope → Z layer mapping ───────────────────────────────────────────────
const scopeLayer = {};
let layerCounter = 0;

function getScopeZ(scope) {
  if (!scope) return 0;
  if (!(scope in scopeLayer)) {
    scopeLayer[scope] = layerCounter++ * 180;
  }
  return scopeLayer[scope];
}

// ─── graph init ───────────────────────────────────────────────────────────
const Graph = ForceGraph3D({ controlType: 'orbit' })(document.getElementById('graph-root'))
  .backgroundColor('#050510')
  .nodeColor(nodeColor)
  .nodeVal(n => Math.sqrt(n.val || 1) * 1.5)
  .nodeLabel(n => `<div style="background:rgba(0,0,0,0.8);color:#e2e8f0;padding:4px 8px;border-radius:4px;font-size:12px;pointer-events:none"><strong>${n.id}</strong><br>${n.name}</div>`)
  .nodeOpacity(0.9)
  .linkColor(linkColor)
  .linkOpacity(0.5)
  .linkWidth(l => l.relation === 'parent_of' ? 0.5 : 1)
  .linkDirectionalParticles(l => l.relation === 'depends_on' ? 2 : 0)
  .linkDirectionalParticleSpeed(0.004)
  .linkDirectionalParticleWidth(1.5)
  .linkCurvature(l => l.relation === 'depends_on' ? 0.15 : 0)
  .d3AlphaDecay(0.008)      // slow decay = long floaty feel
  .d3VelocityDecay(0.3)     // low friction = floaty
  .warmupTicks(40)
  .cooldownTime(Infinity)   // never freeze
  .onNodeClick(onNodeClick)
  .onNodeRightClick(onNodeRightClick)
  .onBackgroundClick(closeSidebar);

// Pin Z per scope so each scope floats in its own plane.
Graph.d3Force('z', null); // remove default z force first
// We apply fz in loadGraph after data arrives.

// ─── data loading ─────────────────────────────────────────────────────────
async function loadGraph() {
  const scope = document.getElementById('scope-select').value;
  const status = document.getElementById('status-select').value;
  const activeRels = [...document.querySelectorAll('.rel-toggle.active')].map(el => el.dataset.rel);
  const relations = activeRels.join(',');

  const params = new URLSearchParams({ status });
  if (scope) params.set('scope', scope);
  if (relations) params.set('relations', relations);

  document.getElementById('stats').textContent = 'Loading…';

  const res = await fetch('/api/graph?' + params);
  const data = await res.json();

  // Assign fz per node based on scope → layer.
  data.nodes.forEach(n => {
    n.fz = getScopeZ(n.scope);
  });

  Graph.graphData(data);

  document.getElementById('stats').textContent =
    `${data.nodes.length} nodes · ${data.links.length} links`;

  // Bloom post-processing for glow effect.
  applyBloom();
}

// ─── bloom ────────────────────────────────────────────────────────────────
function applyBloom() {
  if (!window.THREE) return;
  try {
    // Only apply once.
    if (Graph._bloomApplied) return;
    Graph._bloomApplied = true;

    const { EffectComposer } = THREE;  // not available via CDN this way
    // Bloom requires three/examples/jsm — skip for now, pure physics feel is enough.
    // TODO: add bloom via import map or bundled version.
  } catch (_) {}
}

// ─── scope list ───────────────────────────────────────────────────────────
async function loadScopes() {
  const res = await fetch('/api/scopes');
  const scopes = await res.json();
  const sel = document.getElementById('scope-select');
  scopes.sort().forEach(s => {
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s;
    sel.appendChild(opt);
  });
  // Set scope from URL param if present.
  const urlScope = new URLSearchParams(location.search).get('scope');
  if (urlScope) sel.value = urlScope;
}

// ─── sidebar ──────────────────────────────────────────────────────────────
function openSidebar(id) {
  const sidebar = document.getElementById('sidebar');
  const content = document.getElementById('sidebar-content');
  content.innerHTML = '<p class="htmx-indicator">Loading…</p>';
  sidebar.classList.add('open');

  fetch(`/fragments/artifacts/${encodeURIComponent(id)}`)
    .then(r => r.text())
    .then(html => {
      content.innerHTML = html;
      htmx.process(content);
    })
    .catch(() => {
      content.innerHTML = `<p>Could not load ${id}</p>`;
    });
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
}

function onNodeClick(node) {
  openSidebar(node.id);
  // Fly camera toward clicked node.
  const distance = 120;
  const distRatio = 1 + distance / Math.hypot(node.x || 0, node.y || 0, node.z || 0);
  Graph.cameraPosition(
    { x: (node.x || 0) * distRatio, y: (node.y || 0) * distRatio, z: (node.z || 0) * distRatio },
    node,
    800
  );
}

function onNodeRightClick(node, event) {
  event.preventDefault();
  const menu = document.createElement('div');
  menu.style.cssText = `position:fixed;left:${event.clientX}px;top:${event.clientY}px;
    background:rgba(10,10,20,0.95);border:1px solid rgba(255,255,255,0.15);
    border-radius:6px;padding:0.4rem 0;z-index:100;font-size:0.85em;color:#e2e8f0;min-width:160px`;

  const items = [
    { label: '🔗 Open detail', action: () => window.open(`/artifacts/${node.id}`, '_blank') },
    { label: '🌳 Open tree',   action: () => window.open(`/tree/${node.id}`, '_blank') },
    { label: '⬆ Set active',  action: () => patchField(node.id, 'status', 'active') },
    { label: '✓ Set complete', action: () => patchField(node.id, 'status', 'complete') },
  ];

  items.forEach(item => {
    const el = document.createElement('div');
    el.textContent = item.label;
    el.style.cssText = 'padding:0.35rem 0.75rem;cursor:pointer';
    el.onmouseenter = () => el.style.background = 'rgba(255,255,255,0.1)';
    el.onmouseleave = () => el.style.background = '';
    el.onclick = () => { item.action(); document.body.removeChild(menu); };
    menu.appendChild(el);
  });

  document.body.appendChild(menu);
  const remove = () => { if (document.body.contains(menu)) document.body.removeChild(menu); };
  setTimeout(() => document.addEventListener('click', remove, { once: true }), 10);
}

// ─── write operations ─────────────────────────────────────────────────────
async function patchField(id, field, value) {
  const res = await fetch(`/api/artifacts/${encodeURIComponent(id)}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ field, value }),
  });
  if (res.ok) {
    // Update node in graph without full reload.
    const { nodes, links } = Graph.graphData();
    const node = nodes.find(n => n.id === id);
    if (node) {
      node.status = value;
      Graph.nodeColor(nodeColor); // reapply color fn
      Graph.refresh();
    }
  } else {
    const text = await res.text();
    alert(`Error: ${text}`);
  }
}

// ─── controls wiring ──────────────────────────────────────────────────────
document.querySelectorAll('.rel-toggle').forEach(el => {
  el.addEventListener('click', () => el.classList.toggle('active'));
});

document.getElementById('reload-btn').addEventListener('click', loadGraph);

document.getElementById('scope-select').addEventListener('change', () => {
  const scope = document.getElementById('scope-select').value;
  const url = new URL(location.href);
  if (scope) url.searchParams.set('scope', scope);
  else url.searchParams.delete('scope');
  history.replaceState({}, '', url);
  loadGraph();
});

// ─── boot ─────────────────────────────────────────────────────────────────
loadScopes().then(loadGraph);

// Resize handler.
window.addEventListener('resize', () => {
  Graph.width(window.innerWidth).height(window.innerHeight);
});
</script>
{{end}}
