# Evaluation queries for agent memory retrieval A/B test.
#
# 20 queries across 4 difficulty bands:
#
#   easy   (1-5):  keywords appear verbatim in corpus — FTS5 should find these
#   medium (6-10): partial keyword overlap — both systems should find these
#   hard   (11-15): semantic only — keywords not in text — cosine should win here
#   cross  (16-20): tests breadth across projects
#
# For each query: manually score each result 1 (relevant) or 0 (not relevant).
# Precision@5 = sum(scores) / 5.

queries:
  # --- Easy: verbatim keyword match ---
  - id: Q01
    band: easy
    text: "template conformance check on create vs promote"
    expected_theme: "shifting template validation from artifact creation time to status promotion"

  - id: Q02
    band: easy
    text: "SetField unknown field redirect to attach_section"
    expected_theme: "SetField rejecting unknown fields like description/body and redirecting to attach_section"

  - id: Q03
    band: easy
    text: "Scribe-specific methods extracted from Parchment Protocol ISP cleanup"
    expected_theme: "moving Motd/Dashboard/Inventory/SetGoal/DrainDiscover out of parchment into Scribe"

  - id: Q04
    band: easy
    text: "golangci-lint v2 config migration linters-settings"
    expected_theme: "migrating .golangci.yml from v1 format to v2 format"

  - id: Q05
    band: easy
    text: "session JSONL ingest Pi Claude Code compaction summaries"
    expected_theme: "ingest_session action that reads Pi/Claude JSONL and creates source artifacts"

  # --- Medium: partial keyword, needs some inference ---
  - id: Q06
    band: medium
    text: "why agent creates are no longer rejected when template sections are missing"
    expected_theme: "partial draft accepted at create time, conformance deferred to promote"

  - id: Q07
    band: medium
    text: "AdminManager had too many methods and what we did about it"
    expected_theme: "ISP violations in AdminManager, 17 methods reduced, Scribe-specific moved out"

  - id: Q08
    band: medium
    text: "de-archive discovered as already implemented but untestable"
    expected_theme: "PRC-BUG-11, de-archive existed but had no tests and agents tried admin(restore)"

  - id: Q09
    band: medium
    text: "how motd now surfaces memory without agents calling a separate tool"
    expected_theme: "motd memory section showing top-3 evergreen knowledge artifacts automatically"

  - id: Q10
    band: medium
    text: "how artifact move re-parent action was missing from artifact tool"
    expected_theme: "agents tried artifact(move) but it lived on graph tool, redirect added"

  # --- Hard: semantic only — no keyword overlap expected ---
  - id: Q11
    band: hard
    text: "reducing friction when agents create structured work items"
    expected_theme: "agent friction analysis: 597 template errors, 63 move errors, 571 ghost field sets"

  - id: Q12
    band: hard
    text: "connecting what agents actually did to what the tracker says is open"
    expected_theme: "correlate action matching evidence text against live Scribe artifacts"

  - id: Q13
    band: hard
    text: "agents getting smarter each session without extra ritual steps"
    expected_theme: "recall action, motd memory section — read path for agent memory management"

  - id: Q14
    band: hard
    text: "silent data loss when setting fields on tracked artifacts"
    expected_theme: "ghost field sets succeeding silently, writing to Extra, 571 calls observed"

  - id: Q15
    band: hard
    text: "the boundary between what the engine knows and what the consumer adds"
    expected_theme: "Parchment as generic engine vs Scribe as domain consumer, ISP principle"

  # --- Cross-project: tests corpus breadth ---
  - id: Q16
    band: cross
    text: "strangler fig refactoring extract concerns behind interfaces"
    expected_theme: "strangler fig applied to god packages — origami, djinn, or parchment"

  - id: Q17
    band: cross
    text: "EDA event-driven architecture organs corpus Go agent system"
    expected_theme: "djinn/alef/tako organ-based EDA architecture"

  - id: Q18
    band: cross
    text: "test-driven development red green refactor MCP tools"
    expected_theme: "ROGYB test discipline applied to MCP server development"

  - id: Q19
    band: cross
    text: "SOLID violations hexagonal architecture locus scan results"
    expected_theme: "locus/oculus architecture analysis finding SOLID violations"

  - id: Q20
    band: cross
    text: "walking skeleton end to end wired before real implementation"
    expected_theme: "walking skeleton pattern used in djinn/tako/origami/alef"
