  - id: FIX-NOISE-017
    kind: note
    status: fleeting
    title: "Hyprland — dynamic tiling Wayland compositor in C++"
    sections:
      - name: body
        text: |
          Hyprland supports arbitrary window rules, workspaces, animations.
          Configuration via hyprland.conf — INI-like syntax. IPC via Unix socket.
